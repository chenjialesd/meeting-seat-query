    function onSearch() {

        hospitalBox.style.display = 'none'

            resultBox.innerText = '请先输入姓名'
            return
        }

        const list = seatList.filter(i => i.name === name)
        if (list.length === 0) {
            resultBox.innerText = '❌ 未查询到该姓名，请核对'
            return
        }

        if (list.length === 1) {
            const info = list[0]
            resultBox.innerText = `✅ 查询成功\n座位：${info.row} ${info.no}`
            return
        }

        duplicateList = list
        hospitalBox.style.display = 'flex'
        resultBox.innerText = `⚠️ 检测到${list.length}位同名人员\n请补充输入【单位/医院】后确认`
    }

    function onSearchAgain() {
        const hos = hospitalInput.value.trim().replace(/\s+/g, '')
        if (!hos) {
            resultBox.innerText = '请输入单位/医院'
            return
        }

        const target = duplicateList.find(item => {
            const h = (item.hospital || '').replace(/\s+/g, '')
            return h.includes(hos)
        })

        if (target) {
            resultBox.innerText = `✅ 查询成功\n单位：${target.hospital}\n座位：${target.row} ${target.no}`
            hospitalBox.style.display = 'none'
        } else {
            resultBox.innerText = '❌ 姓名+单位匹配失败，请核对'
        }
