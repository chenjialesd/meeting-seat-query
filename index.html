<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议座位查询</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#d91a21; min-height:100vh; padding:15px; color:#fff; font-family:system-ui, sans-serif; }
        .header { text-align:center; margin-bottom:20px; }
        .title { font-size:30px; font-weight:bold; }
        .desc { font-size:16px; opacity:0.9; margin-top:5px; }
        .search-box { display:flex; margin-bottom:15px; }
        input { flex:1; height:44px; padding:0 15px; font-size:16px; border:none; border-radius:5px 0 0 5px; }
        button { width:90px; height:44px; background:#fff; color:#d91a21; font-size:16px; font-weight:bold; border:none; border-radius:0 5px 5px 0; }
        .result { background:rgba(255,255,255,0.25); padding:15px; border-radius:8px; text-align:center; font-size:16px; line-height:1.5; margin:15px 0; white-space:pre-line; }
        .section { margin:25px 0; }
        .section-title { text-align:center; font-size:20px; font-weight:bold; margin-bottom:15px; }
        .info-item { display:flex; align-items:center; margin:10px 0; font-size:16px; }
        .icon { margin-right:8px; }
        .map-img { width:100%; border-radius:8px; background:#fff; }
        .tip { text-align:center; font-size:14px; margin-top:8px; opacity:0.85; }
    </style>
</head>
<body>

<div class="page">
    <div class="header">
        <div class="title">会议座位查询</div>
        <div class="desc">快速查询个人座位信息</div>
    </div>

    <div class="search-box">
        <input id="nameInput" placeholder="请输入姓名" />
        <button onclick="onSearch()">查询</button>
    </div>

    <div class="search-box" id="hospitalBox" style="display:none; margin-top:15px">
        <input id="hospitalInput" placeholder="请补充输入单位/医院" />
        <button onclick="onSearchAgain()">确认</button>
    </div>

    <div class="result" id="result"></div>

    <div class="section">
        <div class="section-title">会议信息</div>
        <div class="info-item"><span class="icon">🕒</span><span>2026.XX.XX 准时开始</span></div>
        <div class="info-item"><span class="icon">📍</span><span>会议现场</span></div>
    </div>

    <div class="section">
        <div class="section-title">会场座位总图</div>
        <img class="map-img" src="static/seat.jpg.png" />
        <div class="tip">请对照排数+座位号有序就坐</div>
    </div>
</div>

<!-- 关键：数据从外部文件加载 -->
<script src="data.js?v=2"></script>

<script>
    const nameInput = document.getElementById('nameInput')
    const hospitalInput = document.getElementById('hospitalInput')
    const hospitalBox = document.getElementById('hospitalBox')
    const resultBox = document.getElementById('result')
    let duplicateList = []

    function onSearch() {
        const name = nameInput.value.trim()
        resultBox.innerText = ''
        hospitalBox.style.display = 'none'
        if (!name) { resultBox.innerText = '请先输入姓名'; return }
        const list = seatList.filter(i => i.name === name)
        if (list.length === 0) { resultBox.innerText = '❌ 未查询到该姓名，请核对'; return }
        if (list.length === 1) {
            const info = list[0]
            resultBox.innerText = `✅ 查询成功\n座位：${info.row} ${info.no}`
            return
        }
        duplicateList = list
        hospitalBox.style.display = 'flex'
        resultBox.innerText = `⚠️ 检测到${list.length}位同名人员\n请补充输入【单位/医院】后确认`
    }

    function onSearchAgain() {
        const hos = hospitalInput.value.trim().replace(/\s+/g, '')
        if (!hos) { resultBox.innerText = '请输入单位/医院'; return }
        const target = duplicateList.find(item => {
            const h = (item.hospital || '').replace(/\s+/g, '')
            return h.includes(hos)
        })
        if (target) {
            resultBox.innerText = `✅ 查询成功\n单位：${target.hospital}\n座位：${target.row} ${target.no}`
            hospitalBox.style.display = 'none'
        } else {
            resultBox.innerText = '❌ 姓名+单位匹配失败，请核对'
        }
    }
</script>
</body>
</html>
